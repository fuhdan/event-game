name: Deploy to Swarm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to deploy (e.g. 1.2.3)"
        required: true
        type: string
      domain:
        description: "Domain name (e.g. events.example.com)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.version }} to ${{ inputs.environment }}
    runs-on: [self-hosted, linux]
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SWARM_SSH_KEY: ${{ secrets.SWARM_SSH_KEY }}
          SWARM_HOST: ${{ secrets.SWARM_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SWARM_SSH_KEY" > ~/.ssh/swarm_key
          chmod 600 ~/.ssh/swarm_key
          ssh-keyscan -H "$SWARM_HOST" >> ~/.ssh/known_hosts

      - name: Verify image exists in GHCR
        env:
          IMAGE_TAG: ${{ inputs.version }}
          IMAGE_OWNER: ${{ github.repository_owner }}
        run: |
          docker manifest inspect "ghcr.io/$IMAGE_OWNER/event-game-backend:$IMAGE_TAG"
          docker manifest inspect "ghcr.io/$IMAGE_OWNER/event-game-frontend:$IMAGE_TAG"

      - name: Copy stack files to Swarm manager
        env:
          SWARM_HOST: ${{ secrets.SWARM_HOST }}
        run: |
          ssh -i ~/.ssh/swarm_key pipeline@$SWARM_HOST "sudo mkdir -p /opt/event-game/traefik && sudo chown -R pipeline:pipeline /opt/event-game"
          scp -i ~/.ssh/swarm_key deploy/docker-stack.prod.yml \
            pipeline@$SWARM_HOST:/opt/event-game/docker-stack.prod.yml
          scp -i ~/.ssh/swarm_key deploy/traefik/traefik.yml deploy/traefik/dynamic.yml \
            pipeline@$SWARM_HOST:/opt/event-game/traefik/

      - name: Deploy stack
        env:
          IMAGE_TAG: ${{ inputs.version }}
          IMAGE_OWNER: ${{ github.repository_owner }}
          DOMAIN: ${{ inputs.domain }}
          SWARM_HOST: ${{ secrets.SWARM_HOST }}
        run: |
          ssh -i ~/.ssh/swarm_key pipeline@$SWARM_HOST \
            "IMAGE_TAG=$IMAGE_TAG IMAGE_OWNER=$IMAGE_OWNER DOMAIN=$DOMAIN \
             docker stack deploy \
               --with-registry-auth \
               --compose-file /opt/event-game/docker-stack.prod.yml \
               event-game"

      - name: Verify deployment
        env:
          SWARM_HOST: ${{ secrets.SWARM_HOST }}
        run: ssh -i ~/.ssh/swarm_key pipeline@$SWARM_HOST "docker service ls | grep event-game"

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/swarm_key
