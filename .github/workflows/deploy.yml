name: Deploy to Swarm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image tag to deploy (e.g. 1.2.3)"
        required: true
        type: string
      domain:
        description: "Domain name (e.g. events.example.com)"
        required: true
        type: string
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options: [production]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy ${{ inputs.version }} to ${{ inputs.environment }}
    runs-on: [self-hosted, linux]
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify image exists in GHCR
        env:
          IMAGE_TAG: ${{ inputs.version }}
          IMAGE_OWNER: ${{ github.repository_owner }}
        run: |
          docker manifest inspect "ghcr.io/$IMAGE_OWNER/event-game-backend:$IMAGE_TAG"
          docker manifest inspect "ghcr.io/$IMAGE_OWNER/event-game-frontend:$IMAGE_TAG"

      - name: Copy stack files
        run: |
          mkdir -p /opt/event-game/traefik
          cp deploy/docker-stack.prod.yml /opt/event-game/docker-stack.prod.yml
          cp deploy/traefik/traefik.yml deploy/traefik/dynamic.yml /opt/event-game/traefik/

      - name: Deploy stack
        env:
          IMAGE_TAG: ${{ inputs.version }}
          IMAGE_OWNER: ${{ github.repository_owner }}
          DOMAIN: ${{ inputs.domain }}
        run: |
          IMAGE_TAG=$IMAGE_TAG IMAGE_OWNER=$IMAGE_OWNER DOMAIN=$DOMAIN \
            docker stack deploy \
              --with-registry-auth \
              --compose-file /opt/event-game/docker-stack.prod.yml \
              event-game

      - name: Verify deployment
        run: docker service ls | grep event-game
