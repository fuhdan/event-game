name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  trivy-backend:
    name: Trivy — Backend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile.prod
          push: false
          tags: event-game/backend:scan
          load: true
      - name: Generate SARIF report (all severities, for Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: event-game/backend:scan
          format: sarif
          output: trivy-backend.sarif
          exit-code: "0"
      - name: Enforce — fail on fixable CRITICAL/HIGH
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: event-game/backend:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-backend.sarif

  trivy-frontend:
    name: Trivy — Frontend Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: frontend
          file: frontend/Dockerfile.prod
          push: false
          tags: event-game/frontend:scan
          load: true
      - name: Generate SARIF report (all severities, for Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: event-game/frontend:scan
          format: sarif
          output: trivy-frontend.sarif
          exit-code: "0"
      - name: Enforce — fail on fixable CRITICAL/HIGH
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: event-game/frontend:scan
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-frontend.sarif
