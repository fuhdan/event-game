api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
    swarmMode: true
  file:
    filename: /etc/traefik/dynamic.yml

log:
  level: INFO

accessLog: {}
