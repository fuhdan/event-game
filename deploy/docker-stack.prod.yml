version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: event_game
    volumes:
      - postgres_data:/var/lib/postgresql/data
    secrets:
      - postgres_user
      - postgres_password
    networks:
      - internal
    deploy:
      placement:
        constraints: [node.labels.storage == true]

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - internal

  api:
    image: ghcr.io/${IMAGE_OWNER}/event-game-backend:${IMAGE_TAG}
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: event_game
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
    secrets:
      - jwt_secret
      - postgres_user
      - postgres_password
    networks:
      - internal
      - traefik-public
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_traefik-public"
        - "traefik.http.routers.api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)"
        - "traefik.http.routers.api.entrypoints=websecure"
        - "traefik.http.routers.api.tls=true"
        - "traefik.http.services.api.loadbalancer.server.port=8000"

  frontend:
    image: ghcr.io/${IMAGE_OWNER}/event-game-frontend:${IMAGE_TAG}
    networks:
      - internal
      - traefik-public
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_traefik-public"
        - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
        - "traefik.http.routers.frontend.entrypoints=websecure"
        - "traefik.http.routers.frontend.tls=true"
        - "traefik.http.services.frontend.loadbalancer.server.port=80"

secrets:
  jwt_secret:
    external: true
  postgres_user:
    external: true
  postgres_password:
    external: true

networks:
  internal:
    driver: overlay
  traefik-public:
    external: true
    name: traefik_traefik-public

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
